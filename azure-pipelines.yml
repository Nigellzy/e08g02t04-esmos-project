trigger:
- main
- staging 

pool:
  name: "Default"

variables:
- group: esmos-secrets

steps:

# =========================
# STAGING DEPLOYMENT
# =========================
- task: SSH@0
  displayName: "Deploy to STAGING"
  condition: eq(variables['Build.SourceBranchName'], 'staging')
  inputs:
    sshEndpoint: "ssh-odoo17-staging"
    runOptions: "commands"
    failOnStdErr: false
    readyTimeout: "20000"
    commands: |
      echo "Deploying to STAGING..."
      
      sudo mkdir -p /home/G02T04/e08g02t04-esmos-project
      sudo chown -R G02T04:G02T04 /home/G02T04/e08g02t04-esmos-project
      cd /home/G02T04/e08g02t04-esmos-project || exit 1
      
      git -C . fetch origin staging -q
      git -C . reset --hard FETCH_HEAD -q

      echo "POSTGRES_PASSWORD=$(DB_PASSWORD)" > .env
      echo "ODOO_ADMIN_PASSWORD=$(ODOO_ADMIN_PASSWORD)" >> .env

      sudo docker compose build
      sudo docker compose down --remove-orphans
      sudo docker compose up -d


# =========================
# PRODUCTION DEPLOYMENT
# =========================
- task: SSH@0
  displayName: "Deploy to PRODUCTION"
  condition: eq(variables['Build.SourceBranchName'], 'main')
  inputs:
    sshEndpoint: "ssh-odoo17-prod"  
    runOptions: "commands"
    failOnStdErr: false
    readyTimeout: "20000"
    commands: |
      echo "Deploying to PRODUCTION..."

      sudo mkdir -p /home/G02T04/e08g02t04-esmos-project
      sudo chown -R G02T04:G02T04 /home/G02T04/e08g02t04-esmos-project
      cd /home/G02T04/e08g02t04-esmos-project || exit 1
      
      git -C . fetch origin main -q
      git -C . reset --hard FETCH_HEAD -q

      echo "POSTGRES_PASSWORD=$(DB_PASSWORD)" > .env
      echo "ODOO_ADMIN_PASSWORD=$(ODOO_ADMIN_PASSWORD)" >> .env

      sudo docker compose -f docker-compose.prod.yml build
      sudo docker compose -f docker-compose.prod.yml down --remove-orphans
      sudo docker compose -f docker-compose.prod.yml up -d

      echo "Waiting for services..."
      sleep 20

      sudo docker compose -f docker-compose.prod.yml exec -T -u odoo web odoo -u all -d postgres --stop-after-init
      sudo docker compose -f docker-compose.prod.yml restart web