trigger:
- main

pool:
  name: "Default"

variables:
- group: esmos-secrets

steps:
- task: SSH@0
  displayName: "Deploy ESMOS via Pipeline"
  inputs:
    sshEndpoint: "ssh-odoo17-staging"
    runOptions: "commands"
    failOnStdErr: false
    readyTimeout: "20000"
    commands: |
      # 1. Define the absolute path
      PROJECT_DIR="/home/G02T04/e08g02t04-esmos-project"
      
      # 2. STOP DOCKER FIRST (This releases the file locks)
      # We ignore errors here in case the folder/containers don't exist yet
      sudo docker compose -f $PROJECT_DIR/docker-compose.yml down --remove-orphans || true
      
      # 3. Now it is safe to delete
      sudo rm -rf $PROJECT_DIR
      
      # 4. Clone fresh
      git clone -q https://github.com/Nigellzy/e08g02t04-esmos-project.git $PROJECT_DIR
      
      # 5. Inject secrets
      echo "POSTGRES_PASSWORD=$(DB_PASSWORD)" > $PROJECT_DIR/.env
      echo "MARIADB_PASSWORD=$(MOODLE_DB_PASSWORD)" >> $PROJECT_DIR/.env
      echo "ODOO_ADMIN_PASSWORD=$(ODOO_ADMIN_PASSWORD)" >> $PROJECT_DIR/.env
      
      # 6. Start the containers
      sudo docker compose -f $PROJECT_DIR/docker-compose.yml up -d