trigger:
- main
- staging

pool:
  name: "Default"

variables:
- group: esmos-secrets

stages:
# ==========================================
# STAGE 1: STAGING (Branch: staging)
# ==========================================
- stage: DeployStaging
  displayName: "Deploy to Staging VM"
  condition: eq(variables['Build.SourceBranch'], 'refs/heads/staging')
  jobs:
  - job: StagingJob
    steps:
    - task: SSH@0
      displayName: "Deploy ESMOS (Staging)"
      inputs:
        sshEndpoint: "ssh-odoo17-staging"
        runOptions: "commands"
        failOnStdErr: false
        readyTimeout: "20000"
        commands: |
          # 1. Force creation and enter directory immediately
          sudo mkdir -p /home/G02T04/e08g02t04-esmos-project
          sudo chown -R G02T04:G02T04 /home/G02T04/e08g02t04-esmos-project
          cd /home/G02T04/e08g02t04-esmos-project || exit 1
          
          # 2. Isolated Git Reset (Ensures .git is INSIDE the folder)
          [ ! -d ".git" ] && git init -q && git remote add origin https://github.com/Nigellzy/e08g02t04-esmos-project.git || true
          git remote set-url origin https://github.com/Nigellzy/e08g02t04-esmos-project.git
          git fetch origin staging -q
          git reset --hard FETCH_HEAD -q
          
          # 3. Controlled Secret Injection (Explicitly using current directory)
          printf "POSTGRES_PASSWORD=%s\nMARIADB_PASSWORD=%s\nODOO_ADMIN_PASSWORD=%s\nMARIADB_DATABASE=bitnami_moodle\nMARIADB_USER=moodle\n" \
          "$(DB_PASSWORD)" "$(MOODLE_DB_PASSWORD)" "$(ODOO_ADMIN_PASSWORD)" > ./.env
          
          # 4. Permission Fixes
          mkdir -p ./filestore
          sudo chown -R 101:101 ./filestore ./addons
          sudo chmod -R 775 .
          
          # 5. Build and Deploy
          sudo docker compose build --build-arg POSTGRES_PASSWORD=$(DB_PASSWORD) --build-arg ODOO_ADMIN_PASSWORD=$(ODOO_ADMIN_PASSWORD)
          sudo docker compose down --remove-orphans
          sudo docker compose up -d
          
          # 6. Odoo Database Upgrade Only
          echo "Waiting for databases..."
          sleep 15
          sudo docker compose exec -T -u odoo web odoo -u all -d postgres --stop-after-init
          sudo docker compose restart web

# ==========================================
# STAGE 2: PRODUCTION (Branch: main)
# ==========================================
- stage: DeployProduction
  displayName: "Deploy to Production VM"
  condition: eq(variables['Build.SourceBranch'], 'refs/heads/main')
  jobs:
  - job: ProductionJob
    steps:
    - task: SSH@0
      displayName: "Deploy ESMOS (Production)"
      inputs:
        sshEndpoint: "ssh-odoo17-prod"
        runOptions: "commands"
        failOnStdErr: false
        readyTimeout: "20000"
        commands: |
          # 1. Force creation and enter directory immediately
          sudo mkdir -p /home/G02T04/e08g02t04-esmos-project
          sudo chown -R G02T04:G02T04 /home/G02T04/e08g02t04-esmos-project
          cd /home/G02T04/e08g02t04-esmos-project || exit 1
          
          # 2. Isolated Git Reset
          [ ! -d ".git" ] && git init -q && git remote add origin https://github.com/Nigellzy/e08g02t04-esmos-project.git || true
          git remote set-url origin https://github.com/Nigellzy/e08g02t04-esmos-project.git
          git fetch origin main -q
          git reset --hard FETCH_HEAD -q
          
          # 3. Controlled Secret Injection
          printf "POSTGRES_PASSWORD=%s\nMARIADB_PASSWORD=%s\nODOO_ADMIN_PASSWORD=%s\nMARIADB_DATABASE=bitnami_moodle\nMARIADB_USER=moodle\n" \
          "$(DB_PASSWORD)" "$(MOODLE_DB_PASSWORD)" "$(ODOO_ADMIN_PASSWORD)" > ./.env
          
          # 4. Permission Fixes
          mkdir -p ./filestore
          sudo chown -R 101:101 ./filestore ./addons
          sudo chmod -R 775 .
          
          # 5. Build and Deploy
          sudo docker compose build --build-arg POSTGRES_PASSWORD=$(DB_PASSWORD) --build-arg ODOO_ADMIN_PASSWORD=$(ODOO_ADMIN_PASSWORD)
          sudo docker compose down --remove-orphans
          sudo docker compose up -d
          
          # 6. Odoo Database Upgrade Only
          echo "Waiting for databases..."
          sleep 15
          sudo docker compose exec -T -u odoo web odoo -u all -d postgres --stop-after-init
          sudo docker compose restart web