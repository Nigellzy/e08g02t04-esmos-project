trigger:
  - main

pool:
  name: "Default"

variables:
  - group: esmos-secrets

steps:
- task: SSH@0
  inputs:
    sshEndpoint: "ssh-odoo17-staging"
    runOptions: "commands"
    commands: |
      # 1. Setup Environment
      mkdir -p /home/G02T04/e08g02t04-esmos-project
      cd /home/G02T04/e08g02t04-esmos-project || exit 1
      
      # 2. Hard Reset Code
      [ ! -d ".git" ] && git init -q && git remote add origin https://github.com/Nigellzy/e08g02t04-esmos-project.git || true
      git remote set-url origin https://github.com/Nigellzy/e08g02t04-esmos-project.git
      git fetch origin $(Build.SourceBranch) -q
      git reset --hard FETCH_HEAD -q
      
      # 3. Inject Secrets (Absolute paths for reliability)
      echo "POSTGRES_PASSWORD=$(DB_PASSWORD)" > /home/G02T04/e08g02t04-esmos-project/.env
      echo "MARIADB_PASSWORD=$(MOODLE_DB_PASSWORD)" >> /home/G02T04/e08g02t04-esmos-project/.env
      echo "ODOO_ADMIN_PASSWORD=$(ODOO_ADMIN_PASSWORD)" >> /home/G02T04/e08g02t04-esmos-project/.env
      
      # 4. Permissions Fix
      mkdir -p filestore addons
      sudo chown -R 101:101 /home/G02T04/e08g02t04-esmos-project/filestore
      sudo chown -R 101:101 /home/G02T04/e08g02t04-esmos-project/addons
      sudo chmod -R 775 /home/G02T04/e08g02t04-esmos-project
      
      # 5. Build and Deploy
      # Passing both passwords as build args is required for the Odoo config file [cite: 3]
      sudo docker compose build --build-arg POSTGRES_PASSWORD=$(DB_PASSWORD) --build-arg ODOO_ADMIN_PASSWORD=$(ODOO_ADMIN_PASSWORD)
      sudo docker compose up -d --remove-orphans