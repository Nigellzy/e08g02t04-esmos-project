trigger:
- main

pool:
  name: "Default"

variables:
- group: esmos-secrets

steps:
- task: SSH@0
  displayName: "Deploy ESMOS via Pipeline"
  inputs:
    sshEndpoint: "ssh-odoo17-staging"
    runOptions: "commands"
    failOnStdErr: false
    readyTimeout: "20000"
    commands: |
      # 1. Setup Environment (Hardcoded Paths)
      mkdir -p /home/G02T04/e08g02t04-esmos-project
      cd /home/G02T04/e08g02t04-esmos-project
      
      # 2. Hard Reset Code (Data-Safe)
      git init -q
      git remote remove origin 2>/dev/null || true
      git remote add origin https://github.com/Nigellzy/e08g02t04-esmos-project.git
      
      # Fetch and Reset using FETCH_HEAD (PR and Branch safe)
      git fetch origin $(Build.SourceBranch) -q
      git reset --hard FETCH_HEAD -q
      
      # 3. Inject Secrets (Using explicit filenames)
      echo "POSTGRES_PASSWORD=$(DB_PASSWORD)" > .env
      echo "MARIADB_PASSWORD=$(MOODLE_DB_PASSWORD)" >> .env
      echo "ODOO_ADMIN_PASSWORD=$(ODOO_ADMIN_PASSWORD)" >> .env
      
      # 4. Permissions Fix (For Odoo Database Restore)
      mkdir -p filestore addons
      sudo chown -R 101:101 filestore addons
      sudo chmod -R 775 filestore addons
      
      # 5. Native Docker Deploy
      sudo docker compose down --remove-orphans
      sudo docker compose up -d --build