trigger:
- main

pool:
  name: "Default"

variables:
- group: esmos-secrets

steps:
- task: SSH@0
  displayName: "Deploy ESMOS via Pipeline"
  inputs:
    sshEndpoint: "ssh-odoo17-staging"
    runOptions: "commands"
    failOnStdErr: false
    readyTimeout: "20000"
    commands: |
      # 1. Setup Environment & Path Enforcement
      mkdir -p /home/G02T04/e08g02t04-esmos-project
      cd /home/G02T04/e08g02t04-esmos-project || exit 1
      
      # 2. Hard Reset Code (Data-Safe & Remote-Aware)
      if [ ! -d ".git" ]; then
          git init -q
          git remote add origin https://github.com/Nigellzy/e08g02t04-esmos-project.git || true
      else
          # Ensure the remote URL is always correct even if the folder existed
          git remote set-url origin https://github.com/Nigellzy/e08g02t04-esmos-project.git
      fi
      
      git fetch origin $(Build.SourceBranch) -q
      git reset --hard FETCH_HEAD -q
      
      # 3. Inject Secrets
      echo "POSTGRES_PASSWORD=$(DB_PASSWORD)" > .env
      echo "MARIADB_PASSWORD=$(MOODLE_DB_PASSWORD)" >> .env
      echo "ODOO_ADMIN_PASSWORD=$(ODOO_ADMIN_PASSWORD)" >> .env
      echo "MARIADB_DATABASE=bitnami_moodle" >> .env
      echo "MARIADB_USER=moodle" >> .env
      
      # 4. Permissions Fix (Comprehensive)
      # We ensure the project folder and its children are owned by the Odoo user (101)
      mkdir -p filestore addons
      sudo chown -R 101:101 /home/G02T04/e08g02t04-esmos-project
      sudo chmod -R 775 /home/G02T04/e08g02t04-esmos-project
      
      # 5. Native Docker Deploy
      # Using -f prevents Docker from looking for a compose file in the Home directory
      sudo docker compose -f docker-compose.yml down --remove-orphans
      sudo docker compose -f docker-compose.yml up -d --build