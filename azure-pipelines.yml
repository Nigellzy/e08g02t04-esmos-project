trigger:
- main

pool:
  name: "Default"

variables:
- group: esmos-secrets

steps:
- task: SSH@0
  displayName: "Deploy ESMOS via Pipeline"
  inputs:
    sshEndpoint: "ssh-odoo17-staging"
    runOptions: "commands"
    failOnStdErr: false
    readyTimeout: "20000"
    commands: |
      # 1. Setup Environment & Path Enforcement
      # We use the full path to avoid any "missing operand" errors
      mkdir -p /home/G02T04/e08g02t04-esmos-project
      cd /home/G02T04/e08g02t04-esmos-project || exit 1
      
      # 2. Hard Reset Code 
      # Ensures we are on the latest commit from GitHub
      [ ! -d ".git" ] && git init -q && git remote add origin https://github.com/Nigellzy/e08g02t04-esmos-project.git || true
      git remote set-url origin https://github.com/Nigellzy/e08g02t04-esmos-project.git
      git fetch origin $(Build.SourceBranch) -q
      git reset --hard FETCH_HEAD -q
      
      # 3. Inject Secrets (POST-GIT RESET)
      # We do this after git reset so the .env file isn't accidentally deleted
      echo "POSTGRES_PASSWORD=$(DB_PASSWORD)" > .env
      echo "MARIADB_PASSWORD=$(MOODLE_DB_PASSWORD)" >> .env
      echo "ODOO_ADMIN_PASSWORD=$(ODOO_ADMIN_PASSWORD)" >> .env
      echo "MARIADB_DATABASE=bitnami_moodle" >> .env
      echo "MARIADB_USER=moodle" >> .env
      
      # 4. Create Directories & Permissions Fix
      # We create these BEFORE chown to avoid "No such file or directory"
      mkdir -p filestore addons
      
      # Use sudo for permissions to ensure Odoo (UID 101) can write to these volumes
      sudo chown -R 101:101 /home/G02T04/e08g02t04-esmos-project/filestore
      sudo chown -R 101:101 /home/G02T04/e08g02t04-esmos-project/addons
      sudo chmod -R 775 /home/G02T04/e08g02t04-esmos-project
      
      # 5. Build and Deploy
      # Critical: Pass passwords as build-args so the Dockerfile can write odoo.conf correctly
      sudo docker compose build --build-arg POSTGRES_PASSWORD=$(DB_PASSWORD) --build-arg ODOO_ADMIN_PASSWORD=$(ODOO_ADMIN_PASSWORD)
      
      # Clean start to ensure the new secrets are applied
      sudo docker compose down --remove-orphans
      sudo docker compose up -d