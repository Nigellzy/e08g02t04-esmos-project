trigger:
- main

pool:
  name: "Default"

variables:
- group: esmos-secrets

steps:
- task: SSH@0
  displayName: "Deploy ESMOS via Pipeline"
  inputs:
    sshEndpoint: "ssh-odoo17-staging"
    runOptions: "commands"
    failOnStdErr: false
    readyTimeout: "20000"
    commands: |
      # 1. Setup Environment
      PROJECT_DIR="/home/G02T04/e08g02t04-esmos-project"
      mkdir -p $PROJECT_DIR
      cd $PROJECT_DIR
      
      # 2. Hard Reset Code (Preserves Volumes, Overwrites Files)
      git init -q
      git remote remove origin 2>/dev/null || true
      git remote add origin https://github.com/Nigellzy/e08g02t04-esmos-project.git
      
      # Fetch the current branch dynamically instead of hardcoding 'main'
      git fetch origin -q
      git reset --hard origin/$(Build.SourceBranchName) -q
      
      # 3. Securely Inject Secrets
      echo "POSTGRES_PASSWORD=$(DB_PASSWORD)" > .env
      echo "MARIADB_PASSWORD=$(MOODLE_DB_PASSWORD)" >> .env
      echo "ODOO_ADMIN_PASSWORD=$(ODOO_ADMIN_PASSWORD)" >> .env
      
      # 4. Permissions & Execution
      # Ensure the entrypoint script is executable
      chmod +x update_code.sh 2>/dev/null || true
      
      # 5. Native Docker Deploy (Bypassing Buildx)
      sudo docker compose down --remove-orphans
      sudo docker compose up -d --build