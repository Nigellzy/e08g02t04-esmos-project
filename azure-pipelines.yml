trigger:
  - main

pool:
  name: "Default"

variables:
  - group: esmos-secrets

steps:
- task: SSH@0
  inputs:
    sshEndpoint: "ssh-odoo17-staging"
    runOptions: "commands"
    commands: |
      PROJECT_DIR="/home/G02T04/e08g02t04-esmos-project"
      mkdir -p $PROJECT_DIR
      cd $PROJECT_DIR
      
      # Git Sync
      [ ! -d ".git" ] && git init -q && git remote add origin https://github.com/Nigellzy/e08g02t04-esmos-project.git || true
      git remote set-url origin https://github.com/Nigellzy/e08g02t04-esmos-project.git
      git fetch origin $(Build.SourceBranch) -q
      git reset --hard FETCH_HEAD -q
      
      # Inject Secrets (Absolute Paths)
      echo "POSTGRES_PASSWORD=$(DB_PASSWORD)" > $PROJECT_DIR/.env
      echo "MARIADB_PASSWORD=$(MOODLE_DB_PASSWORD)" >> $PROJECT_DIR/.env
      echo "ODOO_ADMIN_PASSWORD=$(ODOO_ADMIN_PASSWORD)" >> $PROJECT_DIR/.env
      
      # Permissions Fix
      mkdir -p filestore addons
      sudo chown -R 101:101 $PROJECT_DIR/filestore $PROJECT_DIR/addons
      
      # Deploy (Pass POSTGRES_PASSWORD as build arg for the Dockerfile config)
      sudo docker compose build --build-arg POSTGRES_PASSWORD=$(DB_PASSWORD) --build-arg ODOO_ADMIN_PASSWORD=$(ODOO_ADMIN_PASSWORD)
      sudo docker compose up -d