services:
  # --- ESMOS (ODOO) 17.0 SYSTEM ---
  web:
    build: .
    depends_on:
      - db
    ports:
      - "8069:8069"
    volumes:
      - ./addons:/mnt/extra-addons
      - ./filestore:/var/lib/odoo/filestore
      - odoo-web-data:/var/lib/odoo

  db:
    image: postgres:13
    environment:
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD: odoo
      POSTGRES_USER: odoo
    volumes:
      - odoo-db-data:/var/lib/postgresql/data

  # --- MOODLE 4.5.3 SYSTEM ---
  moodle-db:
    image: mariadb:10.6
    environment:
      MARIADB_USER: moodle
      MARIADB_PASSWORD: moodle_secure_password
      MARIADB_DATABASE: bitnami_moodle
      MARIADB_ROOT_PASSWORD: root_secure_password
    volumes:
      - moodle-db-data:/bitnami/mariadb
    restart: always

  moodle:
    image: bitnamilegacy/moodle:4.5.3
    depends_on:
      - moodle-db
    ports:
      - "8080:8080"
    environment:
      MOODLE_DATABASE_HOST: moodle-db
      MOODLE_DATABASE_USER: moodle
      MOODLE_DATABASE_PASSWORD: moodle_secure_password
      MOODLE_DATABASE_NAME: bitnami_moodle
    volumes:
      - moodle-web-data:/bitnami/moodle
      - moodle-moodledata:/bitnami/moodledata
    restart: always

volumes:
  odoo-web-data:
  odoo-db-data:
  moodle-db-data:
  moodle-web-data:
  moodle-moodledata: